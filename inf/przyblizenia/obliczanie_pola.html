        <h4>Metoda prostokątów</h4>
        <script type="text/plain" class="lang-python">
            import math
                    
            def f(x):
                return math.sin(x)
                    
            n = int(input("Podaj ilość prostokątów: "))
            a = 1 # lewy kraniec
            b = 3 # prawy kraniec
                    
            dx = (b - a) / n
            s = 0
            x = a
            for i in range(n):
                x += dx
                s += dx * f(x)
                    
            print(s)
        </script>

        <h4>Metoda trapezów</h4>
        <script type="text/plain" class="lang-python">
            import math

            def f(x):
                return math.sin(x)

            n = int(input("Podaj ilość trapezów: "))
            a = 1 # lewy kraniec
            b = 3 # prawy kraniec

            dx = (b - a) / n
            s = 0
            x = a
            f1 = f(x)
            for i in range(n):
                x += dx
                f2 = f(x)
                s += dx * (f1 + f2) / 2
                f1 = f2

            print(s)
        </script>
