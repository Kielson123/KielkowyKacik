    <h1>Przybliżanie liczby π</h1>
    <article>
        <h4>Metoda prostokątów</h4>
        <script type="text/plain" class="lang-python">
            import math

            def f(x):
                return math.sqrt(1 - x*x)

            n = int(input("Podaj ilość prostokątów: "))
            a = -1
            b = 1

            dx = (b - a) / n
            s = 0
            x = a
            for i in range(n):
                x += dx
                s += dx * f(x)

            pi = s * 2.0
            print(pi)
        </script>

        <h4>Metoda trapezów</h4>
        <script type="text/plain" class="lang-python">
            import math
                                
            def f(x):
                return math.sqrt(1 - x*x)
                    
            n = int(input("Podaj ilość trapezów: "))
            a = -1
            b = 1
                    
            dx = (b - a) / n
            s = 0
            x = a
            f1 = f(x)
            for i in range(n):
                x += dx
                f2 = f(x)
                s += dx * (f1 + f2) / 2
                f1 = f2
                    
            pi = s * 2.0
            print(pi)
        </script>

        <h4>Metoda Monte Carlo</h4>
        <script type="text/plain" class="lang-python">
            import random

            n = int(input("Ilość punktów: "))

            n0 = 0
            for i in range(n):
                x = random.uniform(-1, 1)
                y = random.uniform(-1, 1)
                if x*x + y*y <= 1:
                    n0 = n0 + 1
            pi = 4 * n0 / n

            print(pi)
        </script>
